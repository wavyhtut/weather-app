<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false" id="INPUT" oninput="checkWeather()">
            <button>
                <img src="images/search.png" alt="" onclick="checkWeather()">
            </button>
        </div>
        <div class="weatherimg">
            <img src="images/clear.png" alt="">
        </div>
        <div>
            <div class="description">
                Condition
            </div>
            <div class="temperature">
                -°C
            </div>
        </div>
        
        <div class="city">
            City
        </div>
        <div class="details">
            <div class="humidity">
                <img src="images/humidity.png" alt="">
                <div>
                    <h1>Humidity</h1>
                    <div class="humidityvalue">
                        -%
                    </div>
                </div>
            </div>
            <div class="wind">
                <img src="images/wind.png" alt="">
                <div>
                    <h1>Wind</h1>
                    <div class="windvalue">
                        -m/s
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
